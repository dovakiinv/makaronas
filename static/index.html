<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makaronas</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=20260407">
</head>
<body>
  <a href="#app" class="skip-link">Pereiti prie turinio</a>

  <header class="platform-header">
    <span class="platform-header__title">Makaronas</span>
    <button id="btn-dev-skip" class="btn-dev-skip" type="button" title="DEV: Skip to next task">⏭ SKIP</button>
    <button id="btn-dev-write" class="btn-dev-skip" type="button" title="DEV: Skip to write_article phase">✍ WRITE</button>
  </header>

  <main id="app" tabindex="-1" data-active-section="welcome">

    <section id="section-welcome" class="section" aria-label="Pradžia">
      <img src="/img/makaronas-portrait.png" alt="Makaronas" class="welcome-portrait">
      <h2 tabindex="-1">Makaronas</h2>
      <p>Mokymo platforma, kurioje dirbtinis intelektas padeda atpažinti informacinę manipuliaciją.</p>
      <button id="btn-start" class="btn btn-primary" type="button">Pradėti</button>
    </section>

    <section id="section-task" class="section" aria-label="Užduotis">
      <div class="task-layout">
        <div class="content-panel" role="main">
          <h2 tabindex="-1">Turinys</h2>
          <!-- PresentationBlocks rendered here (Phase 4a+) -->
        </div>
        <div class="interaction-panel" role="complementary">
          <h2 tabindex="-1">Sąveika</h2>
          <!-- Interaction UI rendered here (Phase 5a+) -->
        </div>
      </div>
    </section>


    <section id="section-end" class="section" aria-label="Pabaiga">
      <div id="session-report" class="session-report">
        <div class="session-report__loading">Ruošiame jūsų ataskaitą...</div>
      </div>
      <button id="btn-start-new" class="btn btn-secondary" type="button">Prad&#279;ti i&#353; naujo</button>
    </section>

    <section id="section-error" class="section" role="alert" aria-label="Klaida">
      <h2 tabindex="-1">Klaida</h2>
      <p id="error-message" class="error-message"></p>
      <button id="btn-retry" class="btn btn-secondary" type="button">Bandyti dar kartą</button>
    </section>

  </main>

  <script src="/js/vendor/marked.min.js"></script>
  <script src="/js/vendor/purify.min.js"></script>
  <script src="/js/i18n.js?v=20260406"></script>
  <script src="/js/app.js?v=20260406"></script>
  <script src="/js/api.js?v=20260406"></script>
  <script src="/js/renderer.js?v=20260406"></script>
  <script src="/js/dialogue.js?v=20260406"></script>
  <script src="/js/investigation.js?v=20260406"></script>
  <script src="/js/interactions.js?v=20260406"></script>
</body>
</html>
